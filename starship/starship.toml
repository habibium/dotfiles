"$schema" = 'https://starship.rs/config-schema.json'

right_format = "$time"

[time]
disabled = false
time_format = "%I:%M:%S %p"
format = "[$time]($style) "
style = "dimmed white"

[directory]
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"

# Hide username + hostname (otherwise shown over SSH / as root)
[username]
disabled = true

[hostname]
disabled = true

# Hide cloud provider / credential modules from the prompt
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[openstack]
disabled = true

# в”Җв”Җ Language / compiler / interpreter / runtime icons в”Җв”Җ
# Nerd Font glyphs (JetBrains Mono Nerd Font) instead of the default emojis.
# Codepoints verified against the font cmap; names from the Nerd Font set.
[package]
symbol = "п’Ү " # cod-package
display_private = true # show version even for package.json marked "private": true

[docker_context]
disabled = true
symbol = "пҲҹ  "

